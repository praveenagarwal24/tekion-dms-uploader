name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package zip
        run: |
          mkdir -p dist
          zip -r dist/tekion-dms-uploader.zip \
            server.py requirements.txt start_windows.bat \
            start_mac.sh config.json ui/ README.md \
            -x "*.DS_Store" -x "*__pycache__*" -x "*.pyc"

      - name: Delete previous latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            dist/tekion-dms-uploader.zip \
            --title "Latest Release (${{ steps.version.outputs.version }})" \
            --notes "Download tekion-dms-uploader.zip, unzip, and run start_windows.bat (Windows) or start_mac.sh (Mac). Requires Python 3.8+." \
            --latest
